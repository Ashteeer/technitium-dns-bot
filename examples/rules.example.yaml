# ============================================================================
#  ПРИМЕР сгенерированного файла правил (rules_file, по умолчанию rules.yaml).
#  Реальный файл бот создаёт и перезаписывает САМ при каждом изменении —
#  редактировать вручную не нужно. Здесь показан только формат для автора
#  Technitium App.
#
#  Семантика: домен есть в `rules` -> подменяем согласно флагам; домена НЕТ ->
#  запрос форвардится на вышестоящие DNS-серверы.
#    apex=true       — подменять сам домен (A/AAAA = spoof_ip)
#    subdomains=true — подменять *.домен (любой поддомен)
# ============================================================================

# IP, которыми отвечаем на совпавшие запросы.
spoof_ipv4:
  - 95.85.252.176
spoof_ipv6: []

# Эффективные правила (списки + пользовательские правила уже объединены).
rules:
  # обычный домен из списка: и сам домен, и поддомены -> spoof
  - domain: doubleclick.net
    apex: true
    subdomains: true

  # пользователь добавил «только домен» (@): поддомены НЕ трогаем
  - domain: ads.example.com
    apex: true
    subdomains: false

  # twitch.tv: сам домен форвардим наверх (apex=false), поддомены проксируем.
  # Именно этот случай нельзя выразить авторитативной зоной — его и решает App.
  - domain: twitch.tv
    apex: false
    subdomains: true
