# ============================================================================
#  Конфигурация Technitium DNS spoofing bot
#  Скопируйте в config.yaml и заполните своими значениями.
#
#  Здесь только НАСТРОЙКИ. Эффективные правила подмены бот генерирует в
#  отдельный файл (rules_file, по умолчанию rules.yaml) — см. README.
# ============================================================================

# --- ГЛАВНОЕ ---------------------------------------------------------------

# 1) IP-адреса, на которые подменяем DNS-ответы (IPv4 -> A, IPv6 -> AAAA).
#    Можно несколько. Это НАЧАЛЬНОЕ значение: при первом запуске сохраняется в
#    state.json, далее меняется из бота (Настройки -> Сменить IP подмены).
spoof_ips:
  - "10.0.0.53"
  # - "fd00::53"

# 2) Интернет-списки доменов для подмены (скачиваются по интервалу). Формат JSON
#    (см. README). Ссылки на GitHub можно давать как обычные github.com — бот сам
#    преобразует blob/raw в raw.githubusercontent.com.
blocklists:
  - name: "Основной список"
    url: "https://github.com/USER/REPO/blob/main/list.json"
  # - name: "Реклама"
  #   url: "https://raw.githubusercontent.com/USER/REPO/main/ads.json"

# 3) Как часто обновлять списки: "{x}h", "{x}m" или "{x}h{y}m" (напр. "6h").
update_interval: "6h"

# --- ИНФРАСТРУКТУРА --------------------------------------------------------

# 4) Technitium DNS Server API.
technitium:
  url: "http://127.0.0.1:5380"   # IP:PORT панели/API Technitium
  token: "ВСТАВЬТЕ_API_ТОКЕН"    # панель -> Administration -> Sessions -> Create Token
  # Доп. параметры (необязательно): ttl, zone_type, verify_ssl,
  # request_timeout, max_concurrency — значения по умолчанию обычно подходят.

# 5) Telegram-бот и whitelist разрешённых пользователей.
telegram:
  bot_token: "ВСТАВЬТЕ_ТОКЕН_БОТА"   # токен от @BotFather
  whitelist:                          # ТОЛЬКО эти Telegram ID управляют ботом
    - 123456789

# --- ФАЙЛЫ (необязательно) -------------------------------------------------
state_file: "state.json"   # внутреннее состояние бота
rules_file: "rules.yaml"   # генерируемые эффективные правила (для Technitium App)
