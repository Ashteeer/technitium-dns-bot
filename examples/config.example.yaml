# ============================================================================
#  Конфигурация Technitium DNS spoofing bot
#  Скопируйте в config.yaml и заполните своими значениями.
# ============================================================================

# 1) IP-адреса, на которые подменяем DNS-ответы.
#    Можно несколько, можно смешивать IPv4 (-> A) и IPv6 (-> AAAA).
#    ВАЖНО: это лишь НАЧАЛЬНОЕ значение. При первом запуске IP сохраняются в
#    state.json и далее меняются из бота (Настройки -> Сменить IP подмены).
#    После смены через бота это поле игнорируется (приоритет у state.json).
spoof_ips:
  - "10.0.0.53"
  - "fd00::53"

# 2) Интервал обновления интернет-списков.
#    Форматы: "{x}h", "{x}m" или "{x}h{y}m".  Примеры: "6h", "30m", "1h30m".
update_interval: "6h"

# 3) + 5) Technitium DNS Server API.
technitium:
  url: "http://127.0.0.1:5380"   # IP:PORT панели/API Technitium
  token: "ВСТАВЬТЕ_API_ТОКЕН"    # API Token: панель -> Administration -> Sessions -> Create Token
  ttl: 300                       # TTL создаваемых записей, сек
  zone_type: "Primary"           # тип создаваемых зон
  verify_ssl: true               # проверять TLS-сертификат (для https URL)
  request_timeout: 30            # таймаут одного запроса, сек
  max_concurrency: 8             # макс. одновременных запросов к API

# 4) Telegram-бот (включая whitelist разрешённых пользователей).
telegram:
  bot_token: "ВСТАВЬТЕ_ТОКЕН_БОТА"   # токен от @BotFather
  whitelist:                          # ТОЛЬКО эти Telegram ID могут управлять ботом
    - 123456789
    # - 987654321

# 6) Списки для подмены (скачиваются по интервалу). Формат — JSON (см. README).
blocklists:
  - name: "Основной список"
    url: "https://example.com/lists/main.json"
  - name: "Реклама"
    url: "https://example.com/lists/ads.json"

# Прочее
state_file: "state.json"   # файл состояния (пользовательские правила + домены из списков)
list_fetch_timeout: 60     # таймаут скачивания одного списка, сек
